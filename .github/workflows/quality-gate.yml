name: Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: Repository Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Validate workflow syntax
        run: |
          set -euo pipefail
          echo "Validate workflow YAML, shell scripts, Terraform formatting, and docs."

      - name: Terraform format check
        run: |
          set -euo pipefail
          terraform fmt -check -recursive terraform

      - name: Secret scanning boundary
        run: |
          set -euo pipefail
          echo "Run secret scanning in real CI. This demo intentionally contains no secrets."

      - name: Policy and security checks
        run: |
          set -euo pipefail
          echo "Run Checkov/tfsec/Trivy/SonarQube-equivalent controls here."
